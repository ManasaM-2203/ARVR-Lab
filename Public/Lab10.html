<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Based AR</title>

  <script src="aframe.min.js"></script>
  <script src="mindar-image-aframe.prod.js"></script>

  <style>
    body, html {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene 
  mindar-image="imageTargetSrc: targets-4.mind;" 
  vr-mode-ui="false"
  device-orientation-permission-ui="false">

  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <!-- Image Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 3D Object -->
    <a-box 
      position="0 0 0" 
      depth="0.5" 
      height="0.5" 
      width="0.5" 
      color="red"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
    </a-box>

  </a-entity>

</a-scene>

</body>
</html>
